# ============================================================
# Save this file to:
#   .github/workflows/build-image.yml
# in the temporal-java-hands-on repo root.
# ============================================================

name: Build and Push Sandbox Image

on:
  push:
    branches:
      - main
    paths:
      - "docker/Dockerfile"
      - "exercises/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual rebuild"
        required: false
        default: "Manual trigger"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mmerrell/temporal-java-sandbox

jobs:
  build-and-push:
    name: Build and push sandbox image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with git SHA for pinned references
            type=sha,prefix=sha-,format=short
            # Always update :latest on main
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

      - name: Image digest
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} — digest ${{ steps.build-and-push.outputs.digest }}"
