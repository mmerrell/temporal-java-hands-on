title: Temporal Java SDK – Hands-On Lab
teaser: Build a durable order-fulfillment system with the Temporal Java SDK — activities,
  child workflows, parallel fan-out, and cost optimization.
description: |-
  Four progressive coding challenges using the Temporal Java SDK. Each challenge drops you into a partially-implemented order fulfillment workflow and asks you to fill in the missing pieces.

  **What you'll build:**

  - **Exercise 1 – Converting a Workflow:** Replace a fragile retry loop with Temporal Activities and a proper Workflow implementation.
  - **Exercise 2 – Child Workflows:** Extract inventory reservation into a dedicated child workflow with its own history and retry boundary.
  - **Exercise 3 – Parallel Activities:** Fan out warehouse checks concurrently with `Async.function()` and `Promise.allOf()`.
  - **Exercise 4 – Cost Optimization:** Move fast in-process steps to Local Activities to reduce Temporal Cloud Actions.

  Each challenge includes a **Web UI** tab so you can watch your workflows execute in real time, and a **Solve** button if you get stuck.

  **Prerequisites:** Basic Java familiarity. No prior Temporal experience required — the exercises are self-guided.
